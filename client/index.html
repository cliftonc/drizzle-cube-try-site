<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Drizzle Cube - Embeddable Analytics</title>
    <meta name="title" content="Drizzle Cube - Embeddable Analytics" />
    <meta name="description" content="Experience Drizzle Cube's powerful analytics dashboard with type-safe queries, real-time data visualization, and Cube.js compatibility." />
    <meta name="keywords" content="drizzle orm, analytics dashboard, data visualization, semantic layer, cube.js, typescript, sql" />
    <meta name="author" content="Drizzle Cube Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://try.drizzle-cube.dev/" />
    <meta property="og:title" content="Drizzle Cube - Embeddable Analytics" />
    <meta property="og:description" content="Experience Drizzle Cube's powerful analytics dashboard with type-safe queries, real-time data visualization, and Cube.js compatibility." />
    <meta property="og:image" content="https://www.drizzle-cube.dev/drizzle-og.png" />
    <meta property="og:site_name" content="Drizzle Cube" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://try.drizzle-cube.dev/" />
    <meta property="twitter:title" content="Drizzle Cube - Embeddable Analytics" />
    <meta property="twitter:description" content="Experience Drizzle Cube's powerful analytics dashboard with type-safe queries, real-time data visualization, and Cube.js compatibility." />
    <meta property="twitter:image" content="https://www.drizzle-cube.dev/drizzle-og.png" />
    <meta name="twitter:creator" content="@drizzlecube" />
    
    <!-- Additional SEO Meta Tags -->
    <meta name="theme-color" content="#3B82F6" />
    <!-- Canonical URL is managed dynamically by PageHead component -->
    
    <!-- Geist Font -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.css" />
    <!-- Caveat - handwritten/sketch font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" />

    <!-- Initialize theme based on localStorage or system preference -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

        // Set data-theme attribute
        document.documentElement.setAttribute('data-theme', theme);

        // Add theme class for backwards compatibility
        if (theme === 'dark' || theme === 'neon' || theme === 'cyberpunk') {
          document.documentElement.classList.add(theme);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  </body>
</html>
